workspace: .

variables:
  - name: FCAT_LOOP_RATE_HZ
    choices:
    - 1000
    - 500
    - 250
    - 100


configurations:
  - online
  - offline

nodes:

  - name: fcat
    ros_nodes:
    - namespace: /fcat
      name: fcat
    configurations:
    - name: online
      cmd: ros2 launch install/asimov_bringup/share/asimov_bringup/launch/fcat_online.py --rate $FCAT_LOOP_RATE_HZ
    - name: offline
      cmd: ros2 launch install/asimov_bringup/share/asimov_bringup/launch/fcat_offline.py --rate $FCAT_LOOP_RATE_HZ
    start_checked: true


scripts:

  - name: htop
    cmd: htop
    icon: :/icons/terminal.png
    row: 0
    column: 1
    use_terminal: true

  - name: rqt_graph
    cmd: ros2 run rqt_graph rqt_graph &
    row: 1
    column: 0
    use_terminal: false

  - name: cheer_me_up
    configurations:
    - name: online
      # $FCAT_LOOP_RATE_HZ would be replaced with one of the aforementioned choices before this cmd string is executed 
      cmd: cat /etc/hostname && echo I love JPL times $FCAT_LOOP_RATE_HZ
      hostname: asimov-dev
    - name: offline
      cmd: cat /etc/hostname  && echo I love JPL times $FCAT_LOOP_RATE_HZ
    row: 0
    column: 0
    use_terminal: false
