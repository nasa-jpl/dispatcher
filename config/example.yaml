workspace: .

cmd_prefix: RMW_IMPLEMENTATION=rmw_cyclonedds_cpp CYCLONEDDS_URI=/etc/cyclonedds.xml

configurations:
  - online-test-no-config-available
  - online
  - offline

nodes:

  - name: robot
    type: category # Use this type to define a collapsible category of proceses
    items:
    - name: fcat
      type: ros
      ros_nodes:
      - namespace: /fcat
        name: fcat
      configurations:
      - name: online
        cmd: ros2 launch install/asimov_bringup/share/asimov_bringup/launch/fcat_online.py
      - name: offline
        cmd: ros2 launch install/asimov_bringup/share/asimov_bringup/launch/fcat_offline.py
      start_checked: true

  - name: commander
    namespace: /commander
    node_name: commander
    cmd: ros2 run commander commander
    start_checked: true
    stop_tmux_cmd: "C-D"

  - name: simulations
    type: category 
    items:
    - name: ping1_1
      type: shell
      configurations:
      - name: online
        cmd: ping google.com
      - name: offline
        cmd: ping asimov-dev
      start_checked: true

    - name: ping1_2
      type: shell
      configurations:
      - name: online
        cmd: ping google.com
      - name: offline
        cmd: ping asimov-dev
      start_checked: true

  - name: ping2
    type: shell
    configurations:
    - name: online
      cmd: ping google.com
    - name: offline
      cmd: ping asimov-dev
    start_checked: true

scripts:

  - name: kst
    cmd: kst2 &
    icon: :/icons/plot.png
    row: 0
    column: 0
    use_terminal: false

  - name: htop
    cmd: htop
    icon: :/icons/terminal.png
    row: 0
    column: 1
    use_terminal: true

  - name: rqt_graph
    cmd: ros2 run rqt_graph rqt_graph &
    row: 1
    column: 0
    use_terminal: false

