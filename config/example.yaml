workspace: /home/kristopher/Projects
nodes:
  - name: kuka
    namespace: kuka
    node_name: /kuka
    cmd: ros2 run kuka kuka --ros-args -p kuka_rsi_config_path:=storm_launch/cfg/kuka/kuka_offline.yaml
