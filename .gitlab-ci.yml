image: casah347rms/casah:ros2

before_script:
  - DEBIAN_FRONTEND=noninteractive apt install -y
      qt5-default
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - ssh-keyscan fornat1.jpl.nasa.gov >> ~/.ssh/known_hosts
  - cd .. && git clone https://github.com/ros2/yaml_cpp_vendor -b foxy

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - echo "Building..."
    - ls
    - cd .. && colcon build --packages-select yaml_cpp_vendor dispatcher

deploy:
  stage: deploy
  only:
    - master
  script:
    - echo "Deploying..."
    - mkdir -p build
    - cd build
    - cmake ..
    - make tag
