image: casah347rms/ros-foxy-base:latest

stages:
  - build
  - deploy

build-foxy:
  stage: build
  script:
    - echo "Building..."
    - rm -rf /ros2-foxy && mkdir -p /ros2-foxy/src
    - git clone git@fornat1.jpl.nasa.gov:casah/rosx/casah_msgs.git /ros2-foxy/src/casah_msgs
    - cd ..
    - cp -r dispatcher /ros2-foxy/src
    - cd /ros2-foxy
    - colcon build 

build-humble:
  stage: build
  image:
    name: casah347rms/ros-humble-base:latest
  script:
    - echo "Building..."
    - rm -rf /ros2-humble && mkdir -p /ros2-humble/src
    - git clone git@fornat1.jpl.nasa.gov:casah/rosx/casah_msgs.git /ros2-humble/src/casah_msgs
    - cd ..
    - cp -r dispatcher /ros2-humble/src
    - cd /ros2-humble
    - colcon build 


deploy:
  stage: deploy
  only:
    - master
  script:
    - echo "Deploying..."
    - mkdir -p build
    - cd build
    - cmake -DBUILD=OFF ..
    - make tag
