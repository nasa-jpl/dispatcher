image: casah347rms/casah:ros2

before_script:
  - DEBIAN_FRONTEND=noninteractive apt install -y
      qt5-default
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  - ssh-keyscan fornat1.jpl.nasa.gov >> ~/.ssh/known_hosts
  - cd .. && rm -rf yaml_cpp_vendor
  - git clone https://github.com/ros2/yaml_cpp_vendor -b foxy
  - echo "$FORNAT1_CRT" >> /usr/local/share/ca-certificates/fornat1.jpl.nasa.gov.crt
  - update-ca-certificates

stages:
  - build
  - deploy

build:
  stage: build
  script:
    - echo "Building..."
    - cd .. && colcon build --packages-select yaml_cpp_vendor
    - source install/setup.bash
    - colcon build --packages-select dispatcher

deploy:
  stage: deploy
  only:
    - master
  script:
    - echo "Deploying..."
    - cd .. && colcon build --packages-select yaml_cpp_vendor
    - source install/setup.bash
    - colcon build --packages-select dispatcher
    - cd build/dispatcher 
    - make tag
